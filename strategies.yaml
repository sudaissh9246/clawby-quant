  max_position_pct_per_coin: 10
  max_gross_leverage: 3
  daily_loss_halt_pct: 3
  risk_per_trade_pct: 0.5
  max_concurrent_coins: 6
  event_quiet_minutes: 60
  fear_greed_extreme:
    greed: 85
    fear: 15
    size_mult: 0.6
strategies:
  S02_LIQ_REBOUND:
    enabled: false
    scan_interval: 5m
    symbols: []
    risk:
      capital_usd: 0
      leverage: 3
      max_position_usd: 0
      risk_per_trade_pct: 0
    max_hold_hours: 4
    params:
      liq_spike_mult: 6
      drop_atr: 2.5
      decay_pct: 70
      bid_ask_min: 1.1
      stop_atr: 0.6
      tp_retrace: 0.5
  S06_CVD_FADE:
    enabled: false
    scan_interval: 15m
    symbols: []
    risk:
      capital_usd: 0
      leverage: 3
      max_position_usd: 0
      risk_per_trade_pct: 0
    max_hold_hours: 6
    params:
      div_gap_pct: 15
      ask_bid_min: 1.3
      wall_range_pct: 1.0
      size_mult: 0.5
  S11_CRASH_SCALP:
    enabled: false
    scan_interval: 1
    symbols: []
    risk:
      capital_usd: 0
      leverage: 3
      max_position_usd: 0
      risk_per_trade_pct: 0
    max_hold_hours: 2
    params:
      drop_pct: 1.2
      window_sec: 30
      recent_sec: 3
      decel_ratio: 0.4
      liq_confirm_mult: 3
      require_liq: false
      tp_pct: 0.6
      stop_pct: 0.8
      exhaust_tp_frac: 0.5
      cooldown_sec: 300
      spike_short: true
      min_buffer_sec: 20
  S14_VWAP_REVERT:
    enabled: false
    scan_interval: 1m
    symbols: []
    risk:
      capital_usd: 0
      leverage: 3
      max_position_usd: 0
      risk_per_trade_pct: 0
    max_hold_hours: 0.75
    params:
      dev_pct: 2.0
      taker_conf: 0.95
      exit_frac: 0.5
      cooldown_sec: 600
